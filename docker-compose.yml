version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: backend.Dockerfile
    container_name: stockai_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - REDIS_URL=redis://redis:6379/1
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
    depends_on:
      - redis
      - ollama
    # Using host network mode for Ollama if running locally is sometimes easier, 
    # but host.docker.internal works for Windows/Mac to reach host's Ollama.

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: stockai_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: stockai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: stockai_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  redis_data:
  ollama_data:
